name: Roster scrape

on:
  schedule:
    # Weekly: Monday 06:00 UTC — off-peak for government sites
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — fetch + diff preview, write nothing to DB or release/'
        type: boolean
        default: false

jobs:
  scrape:
    name: Scrape → diff → export
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push release/ data commits

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git push has context

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      # ── Rebuild dev DB from durable state ───────────────────────────────────
      # data/db/registry.duckdb is NOT git-tracked — it's a derived artifact.
      # It used to be persisted only via actions/cache, keyed off run id with
      # branch-prefix restore-keys. That cache is evicted after ~7 days of no
      # access, and this workflow runs weekly — right at the eviction edge. A
      # miss silently handed orchestrate.py an empty DB, which made every
      # source look unseen; sources whose scraper didn't succeed that run
      # (transient failure, site change) then got NO snapshot row at all, and
      # the subsequent export silently overwrote data/release/ with a much
      # smaller dataset (see 2026-07-13 incident: prog_co_llp went from 126
      # providers to 0, plus wholesale loss of prog_mn_lp/prog_tx_alp/
      # prog_wa_entity_pilot history — nothing was actually lost, since
      # data/raw/ + data/release/source_snapshot.csv are git-tracked and
      # survived, but the derived tables briefly went out with the bad state).
      #
      # Fix: always rebuild data/db/registry.duckdb from the git-tracked,
      # durable source of truth (data/raw/ blobs + the committed
      # source_snapshot.csv manifest) before running the live scrapers. This
      # is network-free and deterministic, so cache hit/miss can no longer
      # affect correctness — at worst a miss costs a few seconds of rebuild.
      - name: Rebuild dev DB from raw snapshots (reproduce)
        run: uv run python -m pipeline.reproduce

      # ── Main pipeline ─────────────────────────────────────────────────────
      - name: Run orchestrator${{ inputs.dry_run && ' (dry run)' || '' }}
        run: |
          uv run python -m pipeline.orchestrate ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          # Playwright needs a writable home for browser state
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

      # ── Commit release/ + raw/ if changed (skip on dry run) ────────────────
      # data/raw/ is committed alongside data/release/ — golden rule 2 requires
      # immutable raw captures to actually live in the repo, not just ephemeral
      # CI storage (see docs/audit/adversarial_review.md B1). Committing only
      # data/release/ would mean a fresh clone (or the very next CI run) can't
      # rebuild the newly-scraped rows, and the CI drift gate would fail on
      # this run's own push. data/db/ is never committed — it's a derived dev
      # artifact, rebuilt fresh every run by the reproduce step above.
      - name: Commit release/ + raw/ changes
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/release/ data/raw/
          if git diff --cached --quiet; then
            echo "No release/ or raw/ changes — nothing to commit."
          else
            git commit -m "data: automated roster scrape $(date -u +%Y-%m-%dT%H:%M)Z [skip ci]"
            git push
          fi
